<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shop - Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 80px);
            padding-top: env(safe-area-inset-top, 0);
            scroll-behavior: smooth;
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2);
            border-radius: 50%; border-top-color: #00ffff;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #00ffff; font-size: 16px; font-weight: 500; }
        .notification-toast {
            position: fixed; top: max(20px, env(safe-area-inset-top, 20px));
            left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(10,10,10,0.95); border: 1px solid #00ffff;
            border-radius: 12px; padding: 12px 20px; color: #00ffff;
            z-index: 10001; opacity: 0;
            transition: all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
            box-shadow: 0 4px 20px rgba(0,255,255,0.3);
            width: 90%; max-width: 350px; text-align: center; font-size: 14px; font-weight: 500;
        }
        .notification-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .notification-toast.success { border-color: #00ff88; color: #00ff88; box-shadow: 0 4px 20px rgba(0,255,136,0.2); }
        .notification-toast.error { border-color: #ff006e; color: #ff006e; box-shadow: 0 4px 20px rgba(255,0,110,0.2); }
        .header {
            background: rgba(10,10,10,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: max(10px, env(safe-area-inset-top, 10px)) 15px 10px;
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
        }
        .hamburger {
            width: 24px; height: 20px; display: flex;
            flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 1001;
        }
        .hamburger span { width: 100%; height: 2px; background: #00ffff; border-radius: 2px; transition: all 0.3s ease; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translateY(6px) translateX(6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translateY(-6px) translateX(6px); }
        .brand-section { display: flex; align-items: center; gap: 8px; }
        .brand-logo { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; border: 1px solid #00ffff; }
        .brand-name {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-icons { display: flex; gap: 10px; align-items: center; }
        .header-icon {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 8px; color: #00ffff; font-size: 14px; position: relative;
        }
        .badge {
            position: absolute; top: -4px; right: -4px; background: #ff006e; color: #fff;
            font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 10px; min-width: 16px; text-align: center;
        }
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 260px; height: 100vh;
            background: rgba(15,10,25,0.98); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,255,255,0.1);
            padding: calc(60px + env(safe-area-inset-top, 0)) 20px 20px;
            transition: left 0.3s ease; z-index: 999; overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-right { left: auto; right: -100%; border-right: none; border-left: 1px solid rgba(0,255,255,0.1); transition: right 0.3s ease; }
        .sidebar-right.active { right: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden;
            transition: all 0.3s ease; z-index: 998;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .menu-item {
            padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; color: #ccc;
            font-size: 15px; display: flex; align-items: center; gap: 12px;
            transition: background 0.2s ease; cursor: pointer;
        }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        .menu-item i { font-size: 16px; color: #00ffff; width: 20px; text-align: center; }
        .menu-username {
            padding: 15px; margin-bottom: 20px; background: rgba(0,255,255,0.05);
            border-radius: 12px; text-align: center; font-size: 16px; font-weight: 600; color: #fff;
        }
        .search-container {
            padding: 15px; position: sticky;
            top: calc(53px + env(safe-area-inset-top, 0));
            background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); z-index: 990;
        }
        .search-wrapper { position: relative; }
        .search-bar {
            width: 100%; padding: 12px 40px 12px 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 14px; transition: border-color 0.2s;
        }
        .search-bar:focus { outline: none; border-color: #00ffff; background: rgba(255,255,255,0.08); }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #666; font-size: 14px; }
        .filter-slider-container { padding: 0 15px 15px; }
        .filter-slider { display: flex; gap: 10px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 5px; scrollbar-width: none; }
        .filter-slider::-webkit-scrollbar { display: none; }
        .filter-btn {
            padding: 8px 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: #ccc; font-size: 13px; white-space: nowrap; transition: all 0.2s ease; cursor: pointer;
        }
        .filter-btn.active { background: rgba(0,255,255,0.1); border-color: #00ffff; color: #00ffff; }
        .container { padding: 0 15px 20px; }
        .section-title { font-size: 18px; margin-bottom: 15px; color: #fff; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #00ffff; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .subscription-grid { grid-template-columns: 1fr !important; gap: 16px; }
        .product-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 10px; position: relative; cursor: pointer;
        }
        .product-image { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.2); }
        .product-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .product-price-discount { color: #00ff88; font-size: 15px; font-weight: 700; }
        .product-price-original { text-decoration: line-through; color: #666; font-size: 11px; margin-left: 5px; }
        .subscription-card {
            background: rgba(255,255,255,0.03); border: 2px solid rgba(0,255,255,0.3);
            border-radius: 12px; padding: 18px 15px; position: relative;
        }
        .subscription-card.subscribed { border-color: #00ff88; background: rgba(0,255,136,0.08); }
        .subscribed-badge {
            position: absolute; top: 12px; right: 12px; background: #00ff88; color: #000;
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
        }
        .btn {
            width: 100%; padding: 10px; background: #00ffff; color: #000; border: none;
            border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-subscribed { background: #00ff88; color: #000; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 2000; align-items: flex-end;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #121212; width: 100%; max-height: 90vh;
            border-radius: 20px 20px 0 0; padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
            overflow-y: auto; animation: slideUp 0.3s ease; position: relative;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-close {
            position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
            background: rgba(255,255,255,0.1); border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15,10,25,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 5px calc(10px + env(safe-area-inset-bottom, 0)); z-index: 997;
        }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #666; font-size: 10px; min-width: 60px; cursor: pointer; }
        .bottom-nav-item i { font-size: 20px; }
        .bottom-nav-item.active { color: #00ffff; }
        #chatModal .modal-content { height: 100vh; max-height: 100vh; border-radius: 0; display: flex; flex-direction: column; padding: 0; }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-container { padding: 15px; background: #1a1a1a; border-top: 1px solid rgba(255,255,255,0.1); }
        .input-style { width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 16px; }
        .qr-box { text-align: center; background: white; padding: 10px; border-radius: 12px; width: 200px; margin: 15px auto; }
        .qr-box img { width: 100%; height: auto; }
        .order-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
        }
        .status-pending { color: #ffa500; }
        .status-confirmed { color: #00ff88; }
        .status-cancelled { color: #ff006e; }
        .empty-state { text-align: center; padding: 60px 20px; color: #555; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div style="text-align:center;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>
</div>
<div class="notification-toast" id="notificationToast"></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeAllSidebars()"></div>

<!-- Header -->
<div class="header">
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="brand-section">
        <img id="headerLogo" class="brand-logo" src="" alt="Logo" style="display:none;">
        <div id="headerBrandName" class="brand-name">Premium Store</div>
    </div>
    <div class="header-icons">
        <div class="header-icon" onclick="toggleCart()" style="cursor:pointer;">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" id="cartBadge" style="display:none;">0</span>
        </div>
    </div>
</div>

<!-- Left Sidebar -->
<div class="sidebar" id="sidebar">
    <div id="menuContent"></div>
</div>

<!-- Cart Sidebar -->
<div class="sidebar sidebar-right" id="cartSidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div style="font-size:18px; font-weight:bold;"><i class="fas fa-shopping-cart" style="color:#00ffff"></i> Cart</div>
        <div onclick="toggleCart()" style="font-size:24px; cursor:pointer;">×</div>
    </div>
    <div id="cartItems"></div>
    <div id="cartTotalSection" style="display:none; margin-top:20px; padding:15px; background:rgba(0,255,255,0.05); border-radius:12px;">
        <div style="font-size:12px; color:#aaa;">Total Amount</div>
        <div id="cartTotalAmount" style="font-size:24px; font-weight:bold; color:#00ff88;">₹0</div>
        <button class="btn" style="margin-top:15px;" onclick="checkoutCart()">Checkout</button>
    </div>
</div>

<!-- Search -->
<div class="search-container" id="searchContainer">
    <div class="search-wrapper">
        <input type="text" class="search-bar" id="searchBar" placeholder="Search services..." oninput="searchServices()">
        <span class="search-icon"><i class="fas fa-search"></i></span>
    </div>
</div>

<div class="container">
    <div id="mainContent">
        <div class="filter-slider-container" id="filterSliderContainer">
            <div class="filter-slider">
                <button class="filter-btn active" onclick="filterServices('all',this)">All</button>
                <button class="filter-btn" onclick="filterServices('premium',this)">Premium</button>
                <button class="filter-btn" onclick="filterServices('budget',this)">Budget</button>
                <button class="filter-btn" onclick="filterServices('free',this)">Free</button>
            </div>
        </div>
        <h2 class="section-title" id="pageTitle"><i class="fas fa-shopping-bag"></i> Services</h2>
        <div id="productsGrid" class="products-grid"></div>
    </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <div class="bottom-nav-item active" id="nav-home" onclick="navTo('home')"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="bottom-nav-item" id="nav-subs" onclick="navTo('subs')"><i class="fas fa-calendar-check"></i><span>Subs</span></div>
    <div class="bottom-nav-item" id="nav-orders" onclick="navTo('orders')"><i class="fas fa-history"></i><span>Orders</span></div>
    <div class="bottom-nav-item" id="nav-support" onclick="navTo('support')"><i class="fas fa-headset"></i><span>Support</span></div>
    <div class="bottom-nav-item" id="nav-profile" onclick="navTo('profile')"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('productModal')">×</span>
        <img id="modalImg" src="" style="width:100%; height:200px; object-fit:contain; border-radius:12px; margin-bottom:15px; background:#000;">
        <h2 id="modalTitle" style="margin-bottom:10px;"></h2>
        <p id="modalDesc" style="font-size:14px; color:#aaa; margin-bottom:20px; line-height:1.5;"></p>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
            <span id="modalPrice" style="font-size:24px; font-weight:bold; color:#00ff88;"></span>
            <span id="modalOldPrice" style="text-decoration:line-through; color:#666;"></span>
        </div>
        <div id="modalActionButtons" style="display:flex; gap:10px;"></div>
    </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content" style="border-radius:20px;">
        <span class="modal-close" onclick="closeModal('authModal')">×</span>
        <h2 id="authTitle" style="margin-bottom:20px; text-align:center;">Login</h2>
        <div id="loginForm">
            <input type="email" id="email" class="input-style" placeholder="Email" style="margin-bottom:12px;">
            <input type="password" id="pass" class="input-style" placeholder="Password" style="margin-bottom:20px;">
            <button class="btn" onclick="handleLogin()">Login</button>
            <p style="text-align:center; margin-top:15px; font-size:14px; color:#aaa;">New here? <span style="color:#00ffff; cursor:pointer;" onclick="toggleAuthForm(true)">Create Account</span></p>
        </div>
        <div id="signupForm" style="display:none;">
            <input type="text" id="newName" class="input-style" placeholder="Full Name" style="margin-bottom:12px;">
            <input type="email" id="newEmail" class="input-style" placeholder="Email" style="margin-bottom:12px;">
            <input type="password" id="newPass" class="input-style" placeholder="Password (min 6 chars)" style="margin-bottom:20px;">
            <button class="btn" onclick="handleSignup()">Sign Up</button>
            <p style="text-align:center; margin-top:15px; font-size:14px; color:#aaa;">Joined before? <span style="color:#00ffff; cursor:pointer;" onclick="toggleAuthForm(false)">Login</span></p>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('paymentModal')">×</span>
        <h2 style="text-align:center; margin-bottom:15px;">💳 Payment</h2>
        <div class="qr-box">
            <img src="https://i.ibb.co/GQfzjpKT/Screenshot-2026-04-15-03-18-10-459-com-paytm-business.png" alt="QR">
        </div>
        <p style="text-align:center; font-size:12px; color:#aaa; margin-bottom:15px;">Scan & Pay, then enter UTR below</p>
        <input type="text" id="utrInput" class="input-style" placeholder="Enter UTR Number" maxlength="22" style="margin-bottom:20px;">
        <button class="btn" id="confirmPayBtn" onclick="submitOrder()">✅ Confirm Payment</button>
    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" class="modal">
    <div class="modal-content">
        <div class="chat-header">
            <div onclick="closeModal('chatModal')" style="font-size:20px; cursor:pointer;"><i class="fas fa-arrow-left"></i></div>
            <div style="font-weight:bold;">💬 Support Chat</div>
        </div>
        <div class="chat-messages" id="chatMsgs">
            <div style="text-align:center; padding:20px; color:#555; font-size:13px;">Send a message to start chatting</div>
        </div>
        <div class="chat-input-container">
            <div style="display:flex; gap:10px;">
                <input type="text" id="chatInput" class="input-style" placeholder="Type a message..." style="border-radius:25px;" onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="width:45px; height:45px; border-radius:50%; background:#00ffff; border:none; cursor:pointer; flex-shrink:0;"><i class="fas fa-paper-plane" style="color:#000;"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';
    import { getDatabase, ref, onValue, get, set, push, update, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDrjP8o8adBYGih_28XrDrCwVpL3WRu9rE",
        authDomain: "selll-d5149.firebaseapp.com",
        databaseURL: "https://selll-d5149-default-rtdb.firebaseio.com",
        projectId: "selll-d5149",
        storageBucket: "selll-d5149.firebasestorage.app",
        messagingSenderId: "633734276998",
        appId: "1:633734276998:web:b486015bd345028a406e07"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ─── Global State ───────────────────────────────────────────
    window._db = db;
    window._auth = auth;
    window._fbRef = ref;
    window._fbGet = get;
    window._fbSet = set;
    window._fbPush = push;
    window._fbUpdate = update;

    window.user = null;
    window.allProducts = [];
    window.allSubs = [];
    window.userOrders = {};        // ✅ stores all user order IDs
    window.userSubIds = {};        // ✅ stores active subscription IDs
    window.cart = JSON.parse(localStorage.getItem('cart') || '[]');

    // ─── Auth Listener ──────────────────────────────────────────
    onAuthStateChanged(auth, (u) => {
        window.user = u;
        if(u) {
            loadUserData(u.uid);   // ✅ load orders + subs for this user
            loadChat(u.uid);
        } else {
            window.userOrders = {};
            window.userSubIds = {};
        }
        hideLoading();
        updateUI();
    });

    // ─── Load on Page Ready ─────────────────────────────────────
    window.addEventListener('load', () => {
        showLoading();
        loadSettings();
        loadProducts();
        loadSubscriptions();
        updateCartBadge();
    });

    // ─── Brand Settings ─────────────────────────────────────────
    function loadSettings() {
        onValue(ref(db, 'meta/brand'), (snap) => {
            if(snap.exists()) {
                const d = snap.val();
                if(d.logoUrl) {
                    document.getElementById('headerLogo').src = d.logoUrl;
                    document.getElementById('headerLogo').style.display = 'block';
                }
                if(d.name) document.getElementById('headerBrandName').innerText = d.name;
            }
        });
    }

    // ─── Products ───────────────────────────────────────────────
    function loadProducts() {
        onValue(ref(db, 'products'), (snap) => {
            window.allProducts = [];
            if(snap.exists()) {
                Object.entries(snap.val()).forEach(([id, val]) => {
                    window.allProducts.push({
                        id,
                        title: val.title || 'Untitled',
                        description: val.description || '',
                        imageUrl: val.imageUrl || '',
                        discountedPrice: parseFloat(val.discountedPrice || 0),
                        realPrice: val.realPrice ? parseFloat(val.realPrice) : null
                    });
                });
            }
            if(document.getElementById('nav-home').classList.contains('active')) {
                renderProducts(window.allProducts);
            }
            hideLoading();
        });
    }

    // ─── Subscriptions ──────────────────────────────────────────
    function loadSubscriptions() {
        onValue(ref(db, 'subscriptions'), (snap) => {
            window.allSubs = [];
            if(snap.exists()) {
                Object.entries(snap.val()).forEach(([id, val]) => {
                    window.allSubs.push({
                        id,
                        planName: val.planName || 'Plan',
                        description: val.description || 'Premium access to all features.',
                        price: parseFloat(val.price || 0),
                        duration: val.duration || 30
                    });
                });
            }
            // ✅ re-render if subs page is active
            if(document.getElementById('nav-subs').classList.contains('active')) {
                renderSubs();
            }
        });
    }

    // ─── Load User Data (orders + subscriptions) ────────────────
    function loadUserData(uid) {
        // ✅ Load all orders from /orders where userId === uid
        onValue(ref(db, 'orders'), (snap) => {
            window.userOrders = {};
            if(snap.exists()) {
                Object.entries(snap.val()).forEach(([orderId, order]) => {
                    if(order.userId === uid) {
                        window.userOrders[orderId] = order;
                    }
                });
            }
            // Re-render orders page if active
            if(document.getElementById('nav-orders').classList.contains('active')) {
                renderOrders();
            }
        });

        // ✅ Load user's active subscriptions
        onValue(ref(db, `users/${uid}/subscriptions`), (snap) => {
            window.userSubIds = snap.exists() ? snap.val() : {};
            if(document.getElementById('nav-subs').classList.contains('active')) {
                renderSubs();
            }
        });
    }

    // ─── Chat ────────────────────────────────────────────────────
    function loadChat(uid) {
        onValue(ref(db, `chats/${uid}/messages`), (snap) => {
            const container = document.getElementById('chatMsgs');
            container.innerHTML = '';
            if(snap.exists()) {
                Object.values(snap.val()).forEach(m => {
                    const isMe = m.sender === 'user';
                    const div = document.createElement('div');
                    div.style.cssText = `max-width:80%; padding:10px 14px; border-radius:${isMe?'18px 18px 4px 18px':'18px 18px 18px 4px'}; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'#00ffff':'#2a2a2a'}; color:${isMe?'#000':'#fff'}; font-size:14px; line-height:1.4;`;
                    div.innerText = m.message;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            } else {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#555; font-size:13px;">Send a message to start chatting</div>';
            }
        });
    }

    // ─── Login ───────────────────────────────────────────────────
    window.handleLogin = async () => {
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('pass').value;
        if(!e || !p) return notify('Fill all fields', 'error');
        showLoading();
        try {
            await signInWithEmailAndPassword(auth, e, p);
            closeModal('authModal');
            notify('Welcome back! 👋', 'success');
        } catch(err) {
            notify('❌ Wrong email or password', 'error');
        }
        hideLoading();
    };

    // ─── Signup ──────────────────────────────────────────────────
    window.handleSignup = async () => {
        const n = document.getElementById('newName').value.trim();
        const e = document.getElementById('newEmail').value.trim();
        const p = document.getElementById('newPass').value;
        if(!n || !e || p.length < 6) return notify('Complete all fields (min 6 char password)', 'error');
        showLoading();
        try {
            const cred = await createUserWithEmailAndPassword(auth, e, p);
            await updateProfile(cred.user, { displayName: n });
            // ✅ save user profile in DB
            await set(ref(db, `users/${cred.user.uid}/profile`), {
                name: n, email: e, createdAt: new Date().toISOString()
            });
            closeModal('authModal');
            notify('✅ Account created!', 'success');
        } catch(err) {
            notify(err.code === 'auth/email-already-in-use' ? '❌ Email already exists' : '❌ Signup failed', 'error');
        }
        hideLoading();
    };

    // ─── Logout ──────────────────────────────────────────────────
    window.logout = () => {
        signOut(auth);
        window.userOrders = {};
        window.userSubIds = {};
        notify('👋 Logged out');
        navTo('home');
    };

    // ─── Submit Order ────────────────────────────────────────────
    window.submitOrder = async () => {
        const utr = document.getElementById('utrInput').value.trim();
        if(utr.length < 6) return notify('❌ Enter valid UTR number', 'error');
        if(!window.user) return notify('❌ Login required', 'error');
        if(!window.cart.length) return notify('❌ Cart is empty', 'error');

        // ✅ Block duplicate UTR
        const existingOrders = Object.values(window.userOrders);
        const dupUTR = existingOrders.find(o => o.utrId === utr);
        if(dupUTR) return notify('❌ This UTR is already used!', 'error');

        const btn = document.getElementById('confirmPayBtn');
        btn.disabled = true;
        btn.innerText = 'Processing...';
        showLoading();

        try {
            const totalAmount = window.cart.reduce((s, i) => s + parseFloat(i.price || 0), 0);
            const isSub = window.cart.some(i => i.isSub);

            const orderData = {
                userId: window.user.uid,
                userEmail: window.user.email,
                userName: window.user.displayName || 'User',
                utrId: utr,
                items: window.cart.map(i => ({ title: i.title, price: i.price, id: i.id, isSub: i.isSub || false })),
                status: 'pending',
                createdAt: new Date().toISOString(),
                finalAmount: totalAmount,
                type: isSub ? 'subscription' : 'product'
            };

            // ✅ Push order to /orders
            const newOrderRef = push(ref(db, 'orders'));
            await set(newOrderRef, orderData);

            // ✅ Also save order ID under /users/{uid}/orders/{orderId}
            await set(ref(db, `users/${window.user.uid}/orders/${newOrderRef.key}`), {
                orderId: newOrderRef.key,
                createdAt: new Date().toISOString(),
                status: 'pending',
                finalAmount: totalAmount
            });

            // ✅ If subscription, mark under user subscriptions
            if(isSub) {
                const subItem = window.cart.find(i => i.isSub);
                await set(ref(db, `users/${window.user.uid}/subscriptions/${subItem.id}`), {
                    planName: subItem.title,
                    price: subItem.price,
                    orderId: newOrderRef.key,
                    subscribedAt: new Date().toISOString(),
                    status: 'pending'
                });
            }

            window.cart = [];
            localStorage.setItem('cart', '[]');
            updateCartBadge();
            closeModal('paymentModal');
            document.getElementById('utrInput').value = '';
            notify('✅ Order placed! We will confirm soon.', 'success');
            navTo('orders');

        } catch(e) {
            console.error(e);
            notify('❌ Order failed: ' + e.message, 'error');
        }

        btn.disabled = false;
        btn.innerText = '✅ Confirm Payment';
        hideLoading();
    };

    // ─── Send Chat ───────────────────────────────────────────────
    window.sendMsg = async () => {
        const inp = document.getElementById('chatInput');
        const msg = inp.value.trim();
        if(!msg || !window.user) return notify('Login first', 'error');
        try {
            const mRef = push(ref(db, `chats/${window.user.uid}/messages`));
            await set(mRef, { message: msg, sender: 'user', timestamp: new Date().toISOString() });
            await update(ref(db, `chats/${window.user.uid}/info`), {
                lastMsg: msg, userEmail: window.user.email,
                userName: window.user.displayName || 'User', lastTime: new Date().toISOString(), read: false
            });
            inp.value = '';
        } catch(e) { notify('❌ Failed to send', 'error'); }
    };

</script>

<!-- UI Logic -->
<script>
    function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
    function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

    function notify(msg, type='success') {
        const t = document.getElementById('notificationToast');
        t.innerText = msg;
        t.className = `notification-toast show ${type}`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
        document.getElementById('hamburger').classList.toggle('active');
    }

    function toggleCart() {
        document.getElementById('cartSidebar').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    function closeAllSidebars() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('cartSidebar').classList.remove('active');
        document.getElementById('sidebarOverlay').classList.remove('active');
        document.getElementById('hamburger').classList.remove('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function openAuth() { document.getElementById('authModal').classList.add('active'); }

    function toggleAuthForm(showSignup) {
        document.getElementById('loginForm').style.display = showSignup ? 'none' : 'block';
        document.getElementById('signupForm').style.display = showSignup ? 'block' : 'none';
        document.getElementById('authTitle').innerText = showSignup ? 'Create Account' : 'Login';
    }

    function updateUI() {
        const menu = document.getElementById('menuContent');
        if(window.user) {
            menu.innerHTML = `
                <div class="menu-username">👋 ${window.user.displayName || 'User'}</div>
                <div class="menu-item" onclick="navTo('home'); toggleMenu()"><i class="fas fa-home"></i> Home</div>
                <div class="menu-item" onclick="navTo('orders'); toggleMenu()"><i class="fas fa-box"></i> My Orders</div>
                <div class="menu-item" onclick="navTo('subs'); toggleMenu()"><i class="fas fa-calendar-check"></i> Subscriptions</div>
                <div class="menu-item" onclick="navTo('profile'); toggleMenu()"><i class="fas fa-user"></i> Profile</div>
                <div class="menu-item" onclick="logout(); toggleMenu()" style="color:#ff006e"><i class="fas fa-sign-out-alt" style="color:#ff006e;"></i> Logout</div>
            `;
        } else {
            menu.innerHTML = `
                <div class="menu-username">👤 Welcome Guest</div>
                <div class="menu-item" onclick="navTo('home'); toggleMenu()"><i class="fas fa-home"></i> Home</div>
                <div class="menu-item" onclick="openAuth(); toggleMenu()"><i class="fas fa-sign-in-alt"></i> Login / Signup</div>
            `;
        }
    }

    function navTo(page) {
        document.querySelectorAll('.bottom-nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav-' + page)?.classList.add('active');
        document.getElementById('searchContainer').style.display = page === 'home' ? 'block' : 'none';

        const grid = document.getElementById('productsGrid');
        const title = document.getElementById('pageTitle');
        grid.className = 'products-grid';

        if(page === 'home') {
            title.innerHTML = '<i class="fas fa-shopping-bag"></i> Services';
            document.getElementById('filterSliderContainer').style.display = 'block';
            renderProducts(window.allProducts);
        } else if(page === 'subs') {
            title.innerHTML = '<i class="fas fa-calendar-check"></i> Premium Plans';
            document.getElementById('filterSliderContainer').style.display = 'none';
            grid.className = 'products-grid subscription-grid';
            renderSubs();
        } else if(page === 'orders') {
            title.innerHTML = '<i class="fas fa-history"></i> My Orders';
            document.getElementById('filterSliderContainer').style.display = 'none';
            renderOrders();
        } else if(page === 'support') {
            if(!window.user) return openAuth();
            document.getElementById('chatModal').classList.add('active');
        } else if(page === 'profile') {
            title.innerHTML = '<i class="fas fa-user"></i> My Profile';
            document.getElementById('filterSliderContainer').style.display = 'none';
            renderProfile();
        }
        window.scrollTo(0, 0);
    }

    // ─── Render Products ─────────────────────────────────────────
    function renderProducts(list) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        if(!list.length) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i>No services found.</div>';
            return;
        }
        list.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openProduct(p);
            card.innerHTML = `
                <img src="${p.imageUrl}" class="product-image" onerror="this.src='https://via.placeholder.com/200x120/1a1a2e/00ffff?text=No+Image'">
                <div class="product-title">${p.title}</div>
                <div style="margin-bottom:10px;">
                    <span class="product-price-discount">₹${p.discountedPrice}</span>
                    ${p.realPrice ? `<span class="product-price-original">₹${p.realPrice}</span>` : ''}
                </div>
                <button class="btn" onclick="event.stopPropagation(); addToCart('${p.id}')"><i class="fas fa-cart-plus"></i> Add</button>
            `;
            grid.appendChild(card);
        });
    }

    // ─── Render Subscriptions ✅ With Subscribed Badge ────────────
    function renderSubs() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';

        if(!window.allSubs.length) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i>No plans available.</div>';
            return;
        }

        window.allSubs.forEach(s => {
            // ✅ Check if user has this subscription
            const isSubscribed = window.user && window.userSubIds && window.userSubIds[s.id];
            const subData = isSubscribed ? window.userSubIds[s.id] : null;

            const card = document.createElement('div');
            card.className = `subscription-card${isSubscribed ? ' subscribed' : ''}`;

            card.innerHTML = `
                ${isSubscribed ? `<div class="subscribed-badge">✅ Subscribed</div>` : ''}
                <div style="font-size:20px; font-weight:bold; margin-bottom:8px; color:#00ffff; padding-right:${isSubscribed?'100px':'0'};">💎 ${s.planName}</div>
                <div style="font-size:28px; font-weight:bold; color:#00ff88; margin-bottom:5px;">₹${s.price}</div>
                <div style="color:#aaa; font-size:14px; margin-bottom:12px;">📅 Valid for ${s.duration} Days</div>
                <p style="font-size:13px; margin-bottom:20px; color:#ccc; line-height:1.5;">${s.description}</p>
                ${isSubscribed
                    ? `<div style="background:rgba(0,255,136,0.1); border:1px solid #00ff88; border-radius:8px; padding:10px; font-size:12px; color:#00ff88; text-align:center;">
                           🎉 Active Plan · Status: ${(subData.status||'pending').toUpperCase()}
                       </div>`
                    : `<button class="btn" onclick="buySub('${s.id}')"><i class="fas fa-crown"></i> Subscribe Now</button>`
                }
            `;
            grid.appendChild(card);
        });
    }

    // ─── Render Orders ✅ Direct from window.userOrders ───────────
    function renderOrders() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';

        if(!window.user) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><button class="btn" style="width:auto; padding:10px 30px; margin:0 auto;" onclick="openAuth()">Login to view orders</button></div>`;
            return;
        }

        const orders = Object.entries(window.userOrders);

        if(!orders.length) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-bag"></i>No orders yet.<br><span style="font-size:14px; margin-top:10px; display:block;">Start shopping!</span></div>';
            return;
        }

        // ✅ Sort by date descending
        orders.sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));

        orders.forEach(([orderId, o]) => {
            const statusClass = o.status === 'confirmed' ? 'status-confirmed' : o.status === 'cancelled' ? 'status-cancelled' : 'status-pending';
            const statusIcon = o.status === 'confirmed' ? '✅' : o.status === 'cancelled' ? '❌' : '⏳';
            const itemsList = (o.items || []).map(i => i.title).join(', ');
            const date = new Date(o.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

            const div = document.createElement('div');
            div.className = 'order-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-size:11px; color:#555; font-family:monospace;">🔑 #${orderId.slice(-8).toUpperCase()}</span>
                    <span class="${statusClass}" style="font-size:12px; font-weight:bold;">${statusIcon} ${o.status.toUpperCase()}</span>
                </div>
                <div style="font-size:14px; font-weight:600; color:#fff; margin-bottom:6px;">${itemsList}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                    <div style="color:#00ff88; font-weight:bold; font-size:16px;">₹${parseFloat(o.finalAmount||0).toFixed(2)}</div>
                    <div style="font-size:11px; color:#444;">📅 ${date}</div>
                </div>
                ${o.utrId ? `<div style="font-size:11px; color:#555; margin-top:6px;">UTR: ${o.utrId}</div>` : ''}
            `;
            grid.appendChild(div);
        });
    }

    // ─── Render Profile ──────────────────────────────────────────
    function renderProfile() {
        const grid = document.getElementById('productsGrid');
        const orderCount = Object.keys(window.userOrders || {}).length;
        const subCount = Object.keys(window.userSubIds || {}).length;

        grid.innerHTML = `
            <div style="background:rgba(255,255,255,0.03); border-radius:15px; padding:25px; text-align:center;">
                <div style="width:80px; height:80px; background:linear-gradient(135deg,#00ffff,#a855f7); color:#000; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px;">
                    <i class="fas fa-user"></i>
                </div>
                ${window.user ? `
                    <h3 style="margin-bottom:5px; font-size:20px;">👋 ${window.user.displayName || 'User'}</h3>
                    <p style="color:#666; font-size:14px; margin-bottom:20px;">📧 ${window.user.email}</p>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                        <div style="background:rgba(0,255,255,0.05); border:1px solid rgba(0,255,255,0.1); border-radius:10px; padding:15px;">
                            <div style="font-size:24px; font-weight:bold; color:#00ffff;">${orderCount}</div>
                            <div style="font-size:12px; color:#888;">Orders</div>
                        </div>
                        <div style="background:rgba(168,85,247,0.05); border:1px solid rgba(168,85,247,0.2); border-radius:10px; padding:15px;">
                            <div style="font-size:24px; font-weight:bold; color:#a855f7;">${subCount}</div>
                            <div style="font-size:12px; color:#888;">Subscriptions</div>
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                ` : `
                    <h3 style="margin-bottom:10px;">👤 Guest</h3>
                    <p style="color:#666; font-size:14px; margin-bottom:20px;">Login to see your activity</p>
                    <button class="btn" onclick="openAuth()"><i class="fas fa-sign-in-alt"></i> Login / Sign Up</button>
                `}
            </div>
        `;
    }

    // ─── Product Modal ───────────────────────────────────────────
    function openProduct(p) {
        document.getElementById('modalImg').src = p.imageUrl;
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalDesc').innerText = p.description || 'No description provided.';
        document.getElementById('modalPrice').innerText = '₹' + p.discountedPrice;
        document.getElementById('modalOldPrice').innerText = p.realPrice ? '₹' + p.realPrice : '';
        document.getElementById('modalActionButtons').innerHTML = `
            <button class="btn btn-secondary" onclick="addToCart('${p.id}'); closeModal('productModal')"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            <button class="btn" onclick="buyNow('${p.id}')"><i class="fas fa-bolt"></i> Buy Now</button>
        `;
        document.getElementById('productModal').classList.add('active');
    }

    // ─── Cart Actions ────────────────────────────────────────────
    function addToCart(id) {
        const p = window.allProducts.find(x => x.id === id);
        if(!p) return;
        window.cart.push({ id: p.id, title: p.title, price: p.discountedPrice, img: p.imageUrl });
        localStorage.setItem('cart', JSON.stringify(window.cart));
        updateCartBadge();
        notify('✅ Added to cart');
    }

    function buyNow(id) {
        const p = window.allProducts.find(x => x.id === id);
        if(!p) return;
        window.cart = [{ id: p.id, title: p.title, price: p.discountedPrice, img: p.imageUrl }];
        localStorage.setItem('cart', JSON.stringify(window.cart));
        updateCartBadge();
        closeModal('productModal');
        checkoutCart();
    }

    function buySub(id) {
        const s = window.allSubs.find(x => x.id === id);
        if(!s) return;
        window.cart = [{ id: s.id, title: s.planName, price: s.price, img: '', isSub: true }];
        localStorage.setItem('cart', JSON.stringify(window.cart));
        updateCartBadge();
        checkoutCart();
    }

    function updateCartBadge() {
        const b = document.getElementById('cartBadge');
        b.style.display = window.cart.length ? 'block'
