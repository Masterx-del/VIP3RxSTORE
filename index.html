<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shop - Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 80px);
            padding-top: env(safe-area-inset-top, 0);
            scroll-behavior: smooth;
        }
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-content {
            text-align: center;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #00ffff;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00ffff;
            font-size: 16px;
            font-weight: 500;
        }
        /* Notification Toast */
        .notification-toast {
            position: fixed;
            top: max(20px, env(safe-area-inset-top, 20px));
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #00ffff;
            border-radius: 12px;
            padding: 12px 20px;
            color: #00ffff;
            z-index: 10001;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .notification-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .notification-toast.success {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
        }
        .notification-toast.error {
            border-color: #ff006e;
            color: #ff006e;
            box-shadow: 0 4px 20px rgba(255, 0, 110, 0.2);
        }
        /* Header */
        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: max(10px, env(safe-area-inset-top, 10px)) 15px 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hamburger {
            width: 24px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1001;
        }
        .hamburger span {
            width: 100%;
            height: 2px;
            background: #00ffff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translateY(6px) translateX(6px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translateY(-6px) translateX(6px); }
        
        .brand-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #00ffff;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ffff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-icons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: #00ffff;
            font-size: 14px;
            position: relative;
        }
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff006e;
            color: #fff;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        /* Sidebar Menu */
        .sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: 260px;
            height: 100vh;
            background: rgba(15, 10, 25, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 255, 255, 0.1);
            padding: calc(60px + env(safe-area-inset-top, 0)) 20px 20px;
            transition: left 0.3s ease;
            z-index: 999;
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-right { left: auto; right: -100%; border-right: none; border-left: 1px solid rgba(0, 255, 255, 0.1); transition: right 0.3s ease; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .menu-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #ccc;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s ease;
        }
        .menu-item:active { background: rgba(255, 255, 255, 0.1); }
        .menu-item i { font-size: 16px; color: #00ffff; width: 20px; text-align: center; }
        .menu-username {
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        /* Search Bar */
        .search-container {
            padding: 15px;
            position: sticky;
            top: calc(53px + env(safe-area-inset-top, 0));
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 990;
        }
        .search-wrapper { position: relative; }
        .search-bar {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .search-bar:focus { outline: none; border-color: #00ffff; background: rgba(255, 255, 255, 0.08); }
        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 14px;
        }
        /* Filter Slider */
        .filter-slider-container { padding: 0 15px 15px; }
        .filter-slider {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .filter-slider::-webkit-scrollbar { display: none; }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #ccc;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            color: #00ffff;
        }
        /* Grid */
        .container { padding: 0 15px 20px; }
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { color: #00ffff; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .subscription-grid { grid-template-columns: 1fr !important; gap: 16px; }
        
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }
        .product-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.2);
        }
        .product-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            height: 34px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price-discount { color: #00ff88; font-size: 15px; font-weight: 700; }
        .product-price-original { text-decoration: line-through; color: #666; font-size: 11px; margin-left: 5px;}
        
        .subscription-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            padding: 18px 15px;
            position: relative;
        }
        .subscription-card.subscribed { border-color: #00ff88; background: rgba(0,255,136,0.08); }
        .subscribed-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #00ff88;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 10px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .btn-icon {
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            border: none;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: flex-end;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #121212;
            width: 100%;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 10, 25, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 5px calc(10px + env(safe-area-inset-bottom, 0));
            z-index: 997;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 10px;
            min-width: 60px;
            cursor: pointer;
        }
        .bottom-nav-item i { font-size: 20px; }
        .bottom-nav-item.active { color: #00ffff; }

        /* Chat UI */
        #chatModal .modal-content { height: 100vh; max-height: 100vh; border-radius: 0; display: flex; flex-direction: column; padding: 0; }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-container { padding: 15px; background: #1a1a1a; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .input-style {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        .qr-box {
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 12px;
            width: 200px;
            margin: 15px auto;
        }
        .qr-box img { width: 100%; height: auto; }
    </style>
</head>
<body>

    <!-- Overlays -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>
    <div class="notification-toast" id="notificationToast"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeAllSidebars()"></div>

    <!-- Header -->
    <div class="header">
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="brand-section">
            <img id="headerLogo" class="brand-logo" src="" alt="Logo" style="display:none;">
            <div id="headerBrandName" class="brand-name">Premium Store</div>
        </div>
        <div class="header-icons">
            <div class="header-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="cartBadge" style="display: none;">0</span>
            </div>
        </div>
    </div>

    <!-- Left Sidebar -->
    <div class="sidebar" id="sidebar">
        <div id="menuContent"></div>
    </div>

    <!-- Right Sidebar (Cart) -->
    <div class="sidebar sidebar-right" id="cartSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="font-size: 18px; font-weight: bold;"><i class="fas fa-shopping-cart" style="color:#00ffff"></i> Cart</div>
            <div onclick="toggleCart()" style="font-size: 24px; cursor: pointer;">×</div>
        </div>
        <div id="cartItems"></div>
        <div id="cartTotalSection" style="display:none; margin-top: 20px; padding: 15px; background: rgba(0,255,255,0.05); border-radius: 12px;">
            <div style="font-size: 12px; color: #aaa;">Total Amount</div>
            <div id="cartTotalAmount" style="font-size: 24px; font-weight: bold; color: #00ff88;">₹0</div>
            <button class="btn" style="margin-top: 15px;" onclick="checkoutCart()">Checkout</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="search-container" id="searchContainer">
        <div class="search-wrapper">
            <input type="text" class="search-bar" id="searchBar" placeholder="Search services..." oninput="searchServices()">
            <span class="search-icon"><i class="fas fa-search"></i></span>
        </div>
    </div>

    <div class="container">
        <div id="mainContent">
            <div class="filter-slider-container" id="filterSliderContainer">
                <div class="filter-slider">
                    <button class="filter-btn active" onclick="filterServices('all', this)">All</button>
                    <button class="filter-btn" onclick="filterServices('premium', this)">Premium</button>
                    <button class="filter-btn" onclick="filterServices('budget', this)">Budget</button>
                    <button class="filter-btn" onclick="filterServices('free', this)">Free</button>
                </div>
            </div>
            <h2 class="section-title" id="pageTitle"><i class="fas fa-shopping-bag"></i> Services</h2>
            <div id="productsGrid" class="products-grid"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="bottom-nav-item active" id="nav-home" onclick="navTo('home')">
            <i class="fas fa-home"></i><span>Home</span>
        </div>
        <div class="bottom-nav-item" id="nav-subs" onclick="navTo('subs')">
            <i class="fas fa-calendar-check"></i><span>Subs</span>
        </div>
        <div class="bottom-nav-item" id="nav-orders" onclick="navTo('orders')">
            <i class="fas fa-history"></i><span>Orders</span>
        </div>
        <div class="bottom-nav-item" id="nav-support" onclick="navTo('support')">
            <i class="fas fa-headset"></i><span>Support</span>
        </div>
        <div class="bottom-nav-item" id="nav-profile" onclick="navTo('profile')">
            <i class="fas fa-user"></i><span>Profile</span>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('productModal')">×</span>
            <img id="modalImg" src="" style="width:100%; height:200px; object-fit:contain; border-radius:12px; margin-bottom:15px; background:#000;">
            <h2 id="modalTitle" style="margin-bottom:10px;"></h2>
            <p id="modalDesc" style="font-size:14px; color:#aaa; margin-bottom:20px; line-height:1.5;"></p>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <span id="modalPrice" style="font-size:24px; font-weight:bold; color:#00ff88;"></span>
                <span id="modalOldPrice" style="text-decoration:line-through; color:#666;"></span>
            </div>
            <div id="modalActionButtons" style="display:flex; gap:10px;"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content" style="border-radius:20px;">
            <span class="modal-close" onclick="closeModal('authModal')">×</span>
            <h2 id="authTitle" style="margin-bottom:20px; text-align:center;">Login</h2>
            <div id="loginForm">
                <input type="email" id="email" class="input-style" placeholder="Email" style="margin-bottom:12px;">
                <input type="password" id="pass" class="input-style" placeholder="Password" style="margin-bottom:20px;">
                <button class="btn" onclick="handleLogin()">Login</button>
                <p style="text-align:center; margin-top:15px; font-size:14px; color:#aaa;">
                    New here? <span style="color:#00ffff; cursor: pointer;" onclick="toggleAuthForm(true)">Create Account</span>
                </p>
            </div>
            <div id="signupForm" style="display:none;">
                <input type="text" id="newName" class="input-style" placeholder="Full Name" style="margin-bottom:12px;">
                <input type="email" id="newEmail" class="input-style" placeholder="Email" style="margin-bottom:12px;">
                <input type="password" id="newPass" class="input-style" placeholder="Password (min 6 chars)" style="margin-bottom:20px;">
                <button class="btn" onclick="handleSignup()">Sign Up</button>
                <p style="text-align:center; margin-top:15px; font-size:14px; color:#aaa;">
                    Joined before? <span style="color:#00ffff; cursor: pointer;" onclick="toggleAuthForm(false)">Login</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('paymentModal')">×</span>
            <h2 style="text-align:center; margin-bottom:15px;">Payment</h2>
            <div class="qr-box">
                <img src="https://i.ibb.co/GQfzjpKT/Screenshot-2026-04-15-03-18-10-459-com-paytm-business.png" alt="QR">
            </div>
            <p style="text-align:center; font-size:12px; color:#aaa; margin-bottom:15px;">Scan & Pay, then enter UTR below</p>
            <input type="text" id="utrInput" class="input-style" placeholder="12 Digit UTR Number" style="margin-bottom:20px;">
            <button class="btn" onclick="submitOrder()">Confirm Payment</button>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal" class="modal">
        <div class="modal-content">
            <div class="chat-header">
                <div onclick="closeModal('chatModal')" style="font-size:20px; cursor: pointer;"><i class="fas fa-arrow-left"></i></div>
                <div style="font-weight:bold;">Support Chat</div>
            </div>
            <div class="chat-messages" id="chatMsgs"></div>
            <div class="chat-input-container">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chatInput" class="input-style" placeholder="Type a message..." style="border-radius:25px;">
                    <button onclick="sendMsg()" style="width:45px; height:45px; border-radius:50%; background:#00ffff; border:none; cursor: pointer;"><i class="fas fa-paper-plane" style="color: #000;"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';
        import { getDatabase, ref, onValue, get, set, push, update } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDrjP8o8adBYGih_28XrDrCwVpL3WRu9rE",
            authDomain: "selll-d5149.firebaseapp.com",
            databaseURL: "https://selll-d5149-default-rtdb.firebaseio.com",
            projectId: "selll-d5149",
            storageBucket: "selll-d5149.firebasestorage.app",
            messagingSenderId: "633734276998",
            appId: "1:633734276998:web:b486015bd345028a406e07"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ✅ Global State
        window.user = null;
        window.allProducts = [];
        window.allSubs = [];
        window.cart = JSON.parse(localStorage.getItem('cart') || '[]');

        // ✅ Auth State Listener
        onAuthStateChanged(auth, (u) => {
            window.user = u;
            hideLoading();
            updateUI();
            if(u) loadChat();
        });

        // ✅ Initial Page Load
        window.addEventListener('load', () => {
            showLoading();
            loadSettings();
            loadProducts();
            loadSubscriptions();
            updateCartBadge();
        });

        // ✅ Load Brand Settings from Firebase
        function loadSettings() {
            try {
                onValue(ref(db, 'meta/brand'), (snap) => {
                    if(snap.exists()){
                        const d = snap.val();
                        if(d.logoUrl) { 
                            document.getElementById('headerLogo').src = d.logoUrl; 
                            document.getElementById('headerLogo').style.display='block'; 
                        }
                        if(d.name) document.getElementById('headerBrandName').innerText = d.name;
                    }
                });
            } catch(e) {
                console.error('Error loading settings:', e);
            }
        }

        // ✅ Load Products from Firebase
        function loadProducts() {
            try {
                onValue(ref(db, 'products'), (snap) => {
                    window.allProducts = [];
                    if(snap.exists()){
                        Object.entries(snap.val()).forEach(([id, val]) => {
                            window.allProducts.push({
                                id, 
                                title: val.title || 'Untitled',
                                description: val.description || '',
                                imageUrl: val.imageUrl || 'https://via.placeholder.com/200',
                                discountedPrice: parseFloat(val.discountedPrice || 0),
                                realPrice: val.realPrice ? parseFloat(val.realPrice) : null
                            });
                        });
                    }
                    if(document.getElementById('nav-home').classList.contains('active')) {
                        renderProducts(window.allProducts);
                    }
                    hideLoading();
                });
            } catch(e) {
                console.error('Error loading products:', e);
                hideLoading();
            }
        }

        // ✅ Load Subscriptions from Firebase
        function loadSubscriptions() {
            try {
                onValue(ref(db, 'subscriptions'), (snap) => {
                    window.allSubs = [];
                    if(snap.exists()){
                        Object.entries(snap.val()).forEach(([id, val]) => {
                            window.allSubs.push({
                                id,
                                planName: val.planName || 'Plan',
                                description: val.description || 'Premium access',
                                price: parseFloat(val.price || 0),
                                duration: val.duration || 30
                            });
                        });
                    }
                });
            } catch(e) {
                console.error('Error loading subscriptions:', e);
            }
        }

        // ✅ Load Chat Messages
        function loadChat() {
            try {
                onValue(ref(db, `chats/${window.user.uid}/messages`), (snap) => {
                    const container = document.getElementById('chatMsgs');
                    container.innerHTML = '';
                    if(snap.exists()){
                        Object.values(snap.val()).forEach(m => {
                            const isMe = m.sender === 'user';
                            const div = document.createElement('div');
                            div.style.cssText = `max-width:80%; padding:10px; border-radius:12px; margin-bottom:5px; align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'#00ffff':'#333'}; color:${isMe?'#000':'#fff'}; font-size:14px;`;
                            div.innerText = m.message;
                            container.appendChild(div);
                        });
                        container.scrollTop = container.scrollHeight;
                    }
                });
            } catch(e) {
                console.error('Error loading chat:', e);
            }
        }

        // ✅ Authentication: Login
        window.handleLogin = async () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(!e || !p) return notify('Fill all details', 'error');
            
            showLoading();
            try {
                await signInWithEmailAndPassword(auth, e, p);
                closeModal('authModal');
                notify('Welcome back! 👋', 'success');
            } catch(err) {
                notify('❌ Invalid email or password', 'error');
            } finally {
                hideLoading();
            }
        };

        // ✅ Authentication: Signup
        window.handleSignup = async () => {
            const n = document.getElementById('newName').value.trim();
            const e = document.getElementById('newEmail').value.trim();
            const p = document.getElementById('newPass').value.trim();
            
            if(!n || !e || p.length < 6) return notify('⚠️ Complete all fields (Password min 6 chars)', 'error');
            
            showLoading();
            try {
                const cred = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(cred.user, { displayName: n });
                closeModal('authModal');
                notify('✅ Account created successfully!', 'success');
            } catch(err) {
                if(err.code === 'auth/email-already-in-use') {
                    notify('❌ Email already registered', 'error');
                } else {
                    notify('❌ Signup failed: ' + err.message, 'error');
                }
            } finally {
                hideLoading();
            }
        };

        // ✅ Logout
        window.logout = () => {
            signOut(auth);
            notify('👋 Logged out');
            navTo('home');
        };

        // ✅ Submit Order to Firebase
        window.submitOrder = async () => {
            const utr = document.getElementById('utrInput').value.trim();
            if(utr.length < 10) return notify('❌ Invalid UTR (10+ digits)', 'error');
            if(!window.user) return notify('❌ Login required', 'error');
            if(window.cart.length === 0) return notify('❌ Cart is empty', 'error');
            
            showLoading();
            try {
                const totalAmount = window.cart.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
                
                const orderData = {
                    userId: window.user.uid,
                    userEmail: window.user.email,
                    userName: window.user.displayName || 'User',
                    utrId: utr,
                    items: window.cart.map(i => ({ title: i.title, price: i.price })),
                    status: 'pending',
                    createdAt: new Date().toISOString(),
                    finalAmount: totalAmount
                };
                
                // Save order
                const newOrderRef = push(ref(db, 'orders'));
                await set(newOrderRef, orderData);
                
                // Update user purchases
                await set(ref(db, `users/${window.user.uid}/purchases/${newOrderRef.key}`), {
                    orderId: newOrderRef.key,
                    purchasedAt: new Date().toISOString()
                });

                // Clear cart
                window.cart = [];
                localStorage.setItem('cart', '[]');
                updateCartBadge();
                
                closeModal('paymentModal');
                notify('✅ Order placed! UTR: ' + utr, 'success');
                navTo('orders');
                
            } catch(e) {
                console.error('Order error:', e);
                notify('❌ Order failed: ' + e.message, 'error');
            } finally {
                hideLoading();
            }
        };

        // ✅ Send Chat Message
        window.sendMsg = async () => {
            const inp = document.getElementById('chatInput');
            const msg = inp.value.trim();
            if(!msg || !window.user) return;
            
            try {
                const mRef = push(ref(db, `chats/${window.user.uid}/messages`));
                await set(mRef, { 
                    message: msg, 
                    sender: 'user', 
                    timestamp: new Date().toISOString() 
                });
                
                await update(ref(db, `chats/${window.user.uid}/info`), { 
                    lastMsg: msg, 
                    userEmail: window.user.email, 
                    userName: window.user.displayName || 'User',
                    lastTime: new Date().toISOString()
                });
                
                inp.value = '';
            } catch(e) {
                console.error('Chat error:', e);
                notify('❌ Failed to send message', 'error');
            }
        };

    </script>

    <!-- UI & Navigation Logic -->
    <script>
        function showLoading() { 
            document.getElementById('loadingOverlay').classList.add('active'); 
        }
        
        function hideLoading() { 
            document.getElementById('loadingOverlay').classList.remove('active'); 
        }
        
        function notify(msg, type='success') {
            const t = document.getElementById('notificationToast');
            t.innerText = msg;
            t.className = `notification-toast show ${type}`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
            document.getElementById('hamburger').classList.toggle('active');
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function closeAllSidebars() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('cartSidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('hamburger').classList.remove('active');
        }

        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
        }

        function updateUI() {
            const menu = document.getElementById('menuContent');
            if(window.user) {
                menu.innerHTML = `
                    <div class="menu-username">👋 Hello, ${window.user.displayName || 'User'}</div>
                    <div class="menu-item" onclick="navTo('home'); toggleMenu()"><i class="fas fa-home"></i> Home</div>
                    <div class="menu-item" onclick="navTo('orders'); toggleMenu()"><i class="fas fa-box"></i> My Orders</div>
                    <div class="menu-item" onclick="navTo('subs'); toggleMenu()"><i class="fas fa-calendar-check"></i> Subscriptions</div>
                    <div class="menu-item" onclick="logout(); toggleMenu()" style="color:#ff006e"><i class="fas fa-sign-out-alt"></i> Logout</div>
                `;
            } else {
                menu.innerHTML = `
                    <div class="menu-username">👤 Welcome Guest</div>
                    <div class="menu-item" onclick="navTo('home'); toggleMenu()"><i class="fas fa-home"></i> Home</div>
                    <div class="menu-item" onclick="openAuth(); toggleMenu()"><i class="fas fa-sign-in-alt"></i> Login / Signup</div>
                `;
            }
        }

        function navTo(page) {
            document.querySelectorAll('.bottom-nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-'+page).classList.add('active');
            document.getElementById('searchContainer').style.display = (page==='home') ? 'block' : 'none';
            
            const grid = document.getElementById('productsGrid');
            const title = document.getElementById('pageTitle');
            grid.className = 'products-grid';

            if(page === 'home') {
                title.innerHTML = '<i class="fas fa-shopping-bag"></i> Services';
                document.getElementById('filterSliderContainer').style.display = 'block';
                renderProducts(window.allProducts);
            } 
            else if(page === 'subs') {
                title.innerHTML = '<i class="fas fa-calendar-check"></i> Premium Plans';
                document.getElementById('filterSliderContainer').style.display = 'none';
                grid.className = 'products-grid subscription-grid';
                renderSubs();
            }
            else if(page === 'orders') {
                title.innerHTML = '<i class="fas fa-history"></i> My Orders';
                document.getElementById('filterSliderContainer').style.display = 'none';
                renderOrders();
            }
            else if(page === 'support') {
                if(!window.user) return openAuth();
                document.getElementById('chatModal').classList.add('active');
            }
            else if(page === 'profile') {
                title.innerHTML = '<i class="fas fa-user"></i> My Profile';
                document.getElementById('filterSliderContainer').style.display = 'none';
                renderProfile();
            }
            window.scrollTo(0,0);
        }

        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            if(list.length === 0) { 
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px; color:#666;">📦 No services found.</p>'; 
                return; 
            }
            
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.cursor = 'pointer';
                card.onclick = () => openProduct(p);
                card.innerHTML = `
                    <img src="${p.imageUrl}" class="product-image" onerror="this.src='https://via.placeholder.com/200'">
                    <div class="product-title">${p.title}</div>
                    <div style="margin-bottom:10px;">
                        <span class="product-price-discount">₹${p.discountedPrice}</span>
                        ${p.realPrice ? `<span class="product-price-original">₹${p.realPrice}</span>`:''}
                    </div>
                    <button class="btn" onclick="event.stopPropagation(); addToCart('${p.id}')">Add to Cart</button>
                `;
                grid.appendChild(card);
            });
        }

        function renderSubs() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            if(window.allSubs.length === 0) { 
                grid.innerHTML = '<p style="text-align:center; padding:40px; color:#666;">📋 No subscription plans available.</p>'; 
                return; 
            }

            window.allSubs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'subscription-card';
                card.innerHTML = `
                    <div style="font-size:20px; font-weight:bold; margin-bottom:10px; color:#00ffff;">💎 ${s.planName}</div>
                    <div style="font-size:28px; font-weight:bold; color:#00ff88; margin-bottom:5px;">₹${s.price}</div>
                    <div style="color:#aaa; font-size:14px; margin-bottom:15px;">📅 ${s.duration} Days</div>
                    <p style="font-size:13px; margin-bottom:20px; color:#ccc;">${s.description}</p>
                    <button class="btn" onclick="buySub('${s.id}')">Subscribe Now</button>
                `;
                grid.appendChild(card);
            });
        }

        async function renderOrders() {
            if(!window.user) {
                document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:50px;"><button class="btn" style="width:auto; padding:10px 30px;" onclick="openAuth()">Login to view orders</button></div>';
                return;
            }
            
            showLoading();
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            try {
                const response = await fetch(`https://selll-d5149-default-rtdb.firebaseio.com/users/${window.user.uid}/purchases.json`);
                const data = await response.json();
                
                if(!data) { 
                    grid.innerHTML = '<p style="text-align:center; padding:40px; color:#666;">📦 No orders yet. Start shopping!</p>'; 
                }
                else {
                    const orderIds = Object.keys(data).reverse();
                    for(let id of orderIds) {
                        try {
                            const orderRes = await fetch(`https://selll-d5149-default-rtdb.firebaseio.com/orders/${id}.json`);
                            const o = await orderRes.json();
                            if(o) {
                                const div = document.createElement('div');
                                div.className = 'subscription-card';
                                div.style.borderColor = 'rgba(255,255,255,0.1)';
                                div.innerHTML = `
                                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                        <span style="font-size:11px; color:#666;">🔑 ID: ${id.slice(-8)}</span>
                                        <span style="font-size:11px; font-weight:bold; color:${o.status==='confirmed'?'#00ff88':o.status==='pending'?'#ffa500':'#ff006e'}">${o.status.toUpperCase()}</span>
                                    </div>
                                    <div style="font-size:14px; font-weight:bold;">${o.items[0].title} ${o.items.length > 1 ? `+${o.items.length-1} more`:''}</div>
                                    <div style="color:#00ff88; font-weight:bold; margin-top:5px;">💰 ₹${o.finalAmount}</div>
                                    <div style="font-size:11px; color:#444; margin-top:10px;">📅 ${new Date(o.createdAt).toLocaleDateString()}</div>
                                `;
                                grid.appendChild(div);
                            }
                        } catch(e) {
                            console.error('Error fetching order:', e);
                        }
                    }
                }
            } catch(e) {
                console.error('Error:', e);
                grid.innerHTML = '<p style="text-align:center; padding:40px; color:#f00;">❌ Error loading orders</p>';
            } finally {
                hideLoading();
            }
        }

        function renderProfile() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = `
                <div style="background:rgba(255,255,255,0.03); border-radius:15px; padding:20px; text-align:center;">
                    <div style="width:80px; height:80px; background:#00ffff; color:#000; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px;">
                        <i class="fas fa-user"></i>
                    </div>
                    ${window.user ? `
                        <h3 style="margin-bottom:5px;">👋 ${window.user.displayName || 'User'}</h3>
                        <p style="color:#666; font-size:14px; margin-bottom:20px;">📧 ${window.user.email}</p>
                        <button class="btn btn-secondary" onclick="logout()">Logout</button>
                    ` : `
                        <h3>👤 Guest User</h3>
                        <p style="color:#666; font-size:14px; margin-bottom:20px;">Login to save your progress</p>
                        <button class="btn" onclick="openAuth()">Login / Sign Up</button>
                    `}
                </div>
            `;
        }

        function openProduct(p) {
            document.getElementById('modalImg').src = p.imageUrl;
            document.getElementById('modalTitle').innerText = p.title;
            document.getElementById('modalDesc').innerText = p.description || 'No description provided.';
            document.getElementById('modalPrice').innerText = '₹' + p.discountedPrice;
            document.getElementById('modalOldPrice').innerText = p.realPrice ? '₹' + p.realPrice : '';
            
            const btnBox = document.getElementById('modalActionButtons');
            btnBox.innerHTML = `
                <button class="btn btn-secondary" onclick="addToCart('${p.id}'); closeModal('productModal');">Add to Cart</button>
                <button class="btn" onclick="buyNow('${p.id}')">Buy Now</button>
            `;
            document.getElementById('productModal').classList.add('active');
        }

        function addToCart(id) {
            const p = window.allProducts.find(x => x.id === id);
            if(!p) return notify('❌ Product not found', 'error');
            
            window.cart.push({ 
                id: p.id, 
                title: p.title, 
                price: p.discountedPrice, 
                img: p.imageUrl 
            });
            
            localStorage.setItem('cart', JSON.stringify(window.cart));
            updateCartBadge();
            notify('✅ Added to cart');
        }

        function buyNow(id) {
            const p = window.allProducts.find(x => x.id === id);
            if(!p) return;
            
            window.cart = [{ 
                id: p.id, 
                title: p.title, 
                price: p.discountedPrice, 
                img: p.imageUrl 
            }];
            
            localStorage.setItem('cart', JSON.stringify(window.cart));
            updateCartBadge();
            closeModal('productModal');
            checkoutCart();
        }

        function buySub(id) {
            const s = window.allSubs.find(x => x.id === id);
            if(!s) return notify('❌ Subscription not found', 'error');
            
            window.cart = [{ 
                id: s.id, 
                title: s.planName, 
                price: s.price, 
                img: '', 
                isSub: true 
            }];
            
            checkoutCart();
        }

        function updateCartBadge() {
            const b = document.getElementById('cartBadge');
            if(window.cart.length > 0) {
                b.innerText = window.cart.length;
                b.style.display = 'block';
            } else { 
                b.style.display = 'none'; 
            }
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            const totalSec = document.getElementById('cartTotalSection');
            container.innerHTML = '';
            
            if(window.cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">🛒 Cart is empty</p>';
                totalSec.style.display = 'none';
                return;
            }

            let total = 0;
            window.cart.forEach((item, idx) => {
                total += parseFloat(item.price || 0);
                const div = document.createElement('div');
                div.style.cssText = 'display:flex; align-items:center; gap:10px; margin-bottom:10px; background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;';
                div.innerHTML = `
                    <div style="flex:1;">
                        <div style="font-size:13px; font-weight:bold;">${item.title}</div>
                        <div style="color:#00ff88; font-size:12px;">💰 ₹${item.price}</div>
                    </div>
                    <div onclick="removeFromCart(${idx})" style="color:#ff006e; padding:5px; cursor: pointer;"><i class="fas fa-trash"></i></div>
                `;
                container.appendChild(div);
            });

            document.getElementById('cartTotalAmount').innerText = '₹' + total.toFixed(2);
            totalSec.style.display = 'block';
        }

        function removeFromCart(idx) {
            window.cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(window.cart));
            updateCartBadge();
            notify('✅ Removed from cart');
        }

        function checkoutCart() {
            if(!window.user) {
                closeAllSidebars();
                return openAuth();
            }
            if(window.cart.length === 0) {
                return notify('❌ Cart is empty', 'error');
            }
            closeAllSidebars();
            document.getElementById('paymentModal').classList.add('active');
        }

        function openAuth() {
            document.getElementById('authModal').classList.add('active');
        }

        function toggleAuthForm(showSignup) {
            document.getElementById('loginForm').style.display = showSignup ? 'none' : 'block';
            document.getElementById('signupForm').style.display = showSignup ? 'block' : 'none';
            document.getElementById('authTitle').innerText = showSignup ? 'Create Account' : 'Login';
        }

        function filterServices(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if(type === 'all') renderProducts(window.allProducts);
            else if(type === 'premium') renderProducts(window.allProducts.filter(p => p.discountedPrice >= 200));
            else if(type === 'budget') renderProducts(window.allProducts.filter(p => p.discountedPrice < 200 && p.discountedPrice > 0));
            else if(type === 'free') renderProducts(window.allProducts.filter(p => p.discountedPrice == 0));
        }

        function searchServices() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = window.allProducts.filter(p => p.title.toLowerCase().includes(q));
            renderProducts(filtered);
        }

    </script>
</body>
